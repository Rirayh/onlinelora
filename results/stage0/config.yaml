task: sst2
glue_subset: sst2
model_name: roberta-base
num_labels: 2
lora:
  r: 8
  alpha: 16
  dropout: 0.0
  target_modules:
  - query
  - value
optim:
  lr: 0.0002
  weight_decay: 0.0
  warmup_steps: 100
  scheduler: linear
batch_size: 32
eval_batch_size: 64
max_seq_len: 128
total_steps: 5000
save_steps:
- 1000
- 2000
- 3000
- 4000
- 5000
diagnostic_ratio: 0.2
seed: 42
saliency_batches: 8
fisher_max_samples: 256
oracle_test_max: 1024
output_dir: results/stage1/sst2
